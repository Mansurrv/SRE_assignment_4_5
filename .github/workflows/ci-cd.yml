#
# CI/CD pipeline for SRE_assignment_6 (GitHub Actions)
#
# What it does:
# - CI on every push/PR to main/master/dev: syntax/lint, optional tests, SAST, secret scanning
# - Build & push Docker images to GHCR on pushes to main/master/dev (and tags)
# - Optional CD deploy to a remote server via SSH on pushes to main/master (can be disabled by not setting secrets)
#

name: ci-cd

on:
  # Run CI for pull requests targeting main/master/dev.
  pull_request:
    branches: [main, master, dev]
  # Run CI (and build) for pushes to main/master/dev, and for version tags.
  push:
    branches: [main, master, dev]
    tags: ["v*.*.*"]

# Required for pushing to GitHub Container Registry (ghcr.io) using GITHUB_TOKEN.
permissions:
  contents: read
  packages: write
  security-events: write

concurrency:
  # Cancel older runs for the same branch to keep CI fast and avoid parallel deploys.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Registry/repo owner for GHCR images.
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  ci:
    name: CI (lint/tests/security)
    runs-on: ubuntu-latest
    steps:
      # Checkout repository code.
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Set up Python (services are Python/FastAPI).
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # Install lightweight tools (no heavy formatting enforcement).
      - name: Install CI tools
        run: |
          python -m pip install --upgrade pip
          # Ruff for basic linting (kept minimal to avoid style churn).
          python -m pip install ruff==0.6.9
          # Bandit = simple Python SAST.
          python -m pip install bandit==1.7.9
          # pip-audit = dependency vulnerability scan (best-effort).
          python -m pip install pip-audit==2.7.3
          # pytest only needed if tests exist (we’ll detect later).
          python -m pip install pytest==8.3.3

      # Minimal lint: only fail on real problems (syntax errors, undefined names, etc.).
      - name: Ruff (minimal)
        run: |
          ruff check services --select F,E9 --show-fixes

      # Run pytest only if the repository contains any tests.
      - name: Pytest (if tests exist)
        run: |
          if ls -1 **/test_*.py **/*_test.py 2>/dev/null | head -n 1 >/dev/null; then
            pytest -q
          else
            echo "No tests found (skipping pytest)."
          fi

      # Python SAST (Bandit). Exclude virtualenv/cache folders (none expected in repo).
      - name: Bandit (SAST)
        run: |
          bandit -r services -q

      # Dependency vulnerability scan (best-effort): audits requirements.txt files.
      - name: pip-audit (dependencies)
        continue-on-error: true
        run: |
          for req in services/*/requirements.txt; do
            echo "Auditing $req"
            pip-audit -r "$req" || true
          done

      # Secrets detection (Gitleaks). Fails the build if secrets are found.
      - name: Gitleaks (secrets detection)
        uses: gitleaks/gitleaks-action@v2
        with:
          # Scan full git history for better coverage.
          fetch-depth: 0

  build:
    name: Build & push Docker images (GHCR)
    runs-on: ubuntu-latest
    needs: [ci]
    # Build images for pushes (not for PRs from forks).
    if: github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth
          - user
          - product
          - order
          - payment
          - notification
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Login to GHCR using the automatically-provided GITHUB_TOKEN.
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Define tags/labels for images.
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/sre-${{ matrix.service }}-service
          tags: |
            type=sha,format=short
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref_name == 'main' || github.ref_name == 'master' }}

      # Build and push each microservice image.
      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          file: services/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: CD (deploy to EC2 via docker compose)
    runs-on: ubuntu-latest
    needs: [build]
    # Deploy only for main/master branch pushes.
    if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'master')
    steps:
      # Deploy is optional: if you do not configure SSH secrets, this step will be skipped.
      - name: Check SSH secrets
        id: deploy_check
        run: |
          if [ -n "${{ secrets.DEPLOY_SSH_HOST }}" ] && [ -n "${{ secrets.DEPLOY_SSH_USER }}" ] && [ -n "${{ secrets.DEPLOY_SSH_KEY }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to EC2 (SSH + docker compose)
        if: steps.deploy_check.outputs.enabled == 'true'
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT || 22 }}
          script: |
            set -euo pipefail
            # Where the repo lives on the EC2 instance.
            REPO_DIR="${{ secrets.DEPLOY_REPO_DIR || '$HOME/sre-assignment' }}"
            REPO_URL="https://github.com/${{ github.repository }}.git"

            if [ ! -d "$REPO_DIR/.git" ]; then
              mkdir -p "$REPO_DIR"
              git clone "$REPO_URL" "$REPO_DIR"
            fi

            cd "$REPO_DIR"
            git fetch --all --prune
            git checkout "${{ github.ref_name }}"
            git pull --ff-only

            # Start/upgrade the stack on the EC2 instance.
            # This uses your existing docker-compose.yml which builds service images from source on the server.
            FRONTEND_PORT="${{ secrets.DEPLOY_FRONTEND_PORT || '80' }}" \
            PROMETHEUS_PORT="${{ secrets.DEPLOY_PROMETHEUS_PORT || '9090' }}" \
            GRAFANA_PORT="${{ secrets.DEPLOY_GRAFANA_PORT || '3000' }}" \
            ALERTMANAGER_PORT="${{ secrets.DEPLOY_ALERTMANAGER_PORT || '9093' }}" \
            docker compose --profile capacity up -d --build

            docker compose ps
