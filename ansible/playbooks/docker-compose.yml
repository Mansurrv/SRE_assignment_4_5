---
- name: Install Docker and deploy with Docker Compose
  hosts: docker_hosts
  become: true
  vars_files:
    - ../group_vars/all.yml
  tasks:
    - name: Install base packages
      ansible.builtin.apt:
        update_cache: true
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present

    - name: Add Docker GPG key
      ansible.builtin.shell: |
        install -m 0755 -d /etc/apt/keyrings
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
        chmod a+r /etc/apt/keyrings/docker.gpg
      args:
        creates: /etc/apt/keyrings/docker.gpg

    - name: Add Docker repository
      ansible.builtin.shell: |
        echo \
          "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu \
          $(. /etc/os-release && echo \"$VERSION_CODENAME\") stable" > /etc/apt/sources.list.d/docker.list
      args:
        creates: /etc/apt/sources.list.d/docker.list

    - name: Install Docker engine and Compose plugin
      ansible.builtin.apt:
        update_cache: true
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present

    - name: Ensure repo directory exists
      ansible.builtin.file:
        path: "{{ repo_path }}"
        state: directory
        mode: "0755"

    - name: Install git (optional)
      ansible.builtin.apt:
        update_cache: true
        name: git
        state: present

    - name: Check if repo path is already a git repo
      when: repo_git_url | length > 0
      ansible.builtin.stat:
        path: "{{ repo_path }}/.git"
      register: repo_git_dir

    - name: Remove existing non-git directory at repo_path (to allow git clone)
      when: (repo_git_url | length > 0) and (not repo_git_dir.stat.exists)
      ansible.builtin.file:
        path: "{{ repo_path }}"
        state: absent

    - name: Ensure repo directory exists (after cleanup)
      when: repo_git_url | length > 0
      ansible.builtin.file:
        path: "{{ repo_path }}"
        state: directory
        mode: "0755"

    - name: Deploy code from Git (recommended)
      when: repo_git_url | length > 0
      ansible.builtin.git:
        repo: "{{ repo_git_url }}"
        dest: "{{ repo_path }}"
        version: HEAD
        force: true

    - name: Copy project to host (fallback if no Git URL)
      when: repo_git_url | length == 0
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../"
        dest: "{{ repo_path }}/"
        owner: root
        group: root
        mode: preserve

    - name: Create .env for Compose
      ansible.builtin.copy:
        dest: "{{ repo_path }}/.env"
        mode: "0644"
        content: |
          FRONTEND_PORT={{ frontend_port }}
          PROMETHEUS_PORT=9090
          ALERTMANAGER_PORT=9093
          GRAFANA_PORT=3000

          DATABASE_URL=postgresql://app:app@postgres:5432/app

          JWT_SECRET={{ jwt_secret }}
          JWT_ISSUER={{ jwt_issuer }}
          ACCESS_TOKEN_EXPIRE_MINUTES=120

          PRODUCT_SERVICE_URL=http://product-service:8000
          USER_SERVICE_URL=http://user-service:8000
          PAYMENT_SERVICE_URL=http://payment-service:8000
          NOTIFICATION_SERVICE_URL=http://notification-service:8000

          PAYMENT_FAIL_RATE=0.0
          PAYMENT_LATENCY_MS=30

          # Allow using dev secrets for demo environments.
          ALLOW_DEV_SECRETS=1

    - name: Validate env
      ansible.builtin.command: python3 scripts/validate_env.py
      args:
        chdir: "{{ repo_path }}"

    - name: Deploy stack (docker compose)
      ansible.builtin.command: docker compose up -d --build
      args:
        chdir: "{{ repo_path }}"
