server {
  listen 80;
  resolver 127.0.0.11 valid=5s ipv6=off;

  # Static frontend
  location / {
    root /usr/share/nginx/html;
    try_files $uri /index.html;
  }

  # Reverse proxy to avoid CORS in browser
  location /api/auth/ {
    set $auth_upstream http://auth-service:8000;
    rewrite ^/api/auth/(.*)$ /$1 break;
    proxy_pass $auth_upstream;
  }

  location /api/users/ {
    set $user_upstream http://user-service:8000;
    rewrite ^/api/users/(.*)$ /$1 break;
    proxy_pass $user_upstream;
  }

  location /api/products/ {
    set $product_upstream http://product-service:8000;
    rewrite ^/api/products/(.*)$ /$1 break;
    proxy_pass $product_upstream;
  }

  location /api/orders/ {
    set $order_upstream http://order-service:8000;
    rewrite ^/api/orders/(.*)$ /$1 break;
    proxy_pass $order_upstream;
  }
}
