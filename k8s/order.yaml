apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: sre/order-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              value: postgresql://app:app@postgres:5432/app
            - name: PRODUCT_SERVICE_URL
              value: http://product-service:8000
            - name: USER_SERVICE_URL
              value: http://user-service:8000
            - name: PAYMENT_SERVICE_URL
              value: http://payment-service:8000
            - name: NOTIFICATION_SERVICE_URL
              value: http://notification-service:8000
            - name: JWT_SECRET
              value: dev-secret-change-me
            - name: JWT_ISSUER
              value: sre-assignment
          readinessProbe:
            httpGet: { path: /ready, port: 8000 }
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /health, port: 8000 }
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
spec:
  selector:
    app: order-service
  ports:
    - name: http
      port: 8000
      targetPort: 8000
